name: DB connection check (dev, one-time, self-deleting)

# Manually run to diagnose "Error establishing a database connection".
# Uploads a single self-deleting PHP probe to the dev root that reads the live
# wp-config.php constants and reports the exact MySQL error. It unlink()s itself
# after the first request and never prints the password (only its length).

on:
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Build probe
        run: |
          mkdir -p diag
          cat > diag/oshc-dbcheck-7f3a.php <<'PHP'
          <?php
          header('Content-Type: text/plain');
          $cfgPath = __DIR__ . '/wp-config.php';
          if (!is_file($cfgPath)) { echo "no wp-config.php at root\n"; @unlink(__FILE__); exit; }
          $tokens = token_get_all(file_get_contents($cfgPath));
          $c = array();
          for ($i = 0; $i < count($tokens); $i++) {
              if (is_array($tokens[$i]) && $tokens[$i][0] === T_STRING && $tokens[$i][1] === 'define') {
                  $args = array();
                  for ($j = $i + 1; $j < count($tokens); $j++) {
                      if (is_array($tokens[$j]) && $tokens[$j][0] === T_CONSTANT_ENCAPSED_STRING) {
                          $args[] = stripcslashes(substr($tokens[$j][1], 1, -1));
                      }
                      if ($tokens[$j] === ';') break;
                      if (count($args) >= 2) break;
                  }
                  if (count($args) === 2) $c[$args[0]] = $args[1];
              }
          }
          $h = isset($c['DB_HOST']) ? $c['DB_HOST'] : '';
          $u = isset($c['DB_USER']) ? $c['DB_USER'] : '';
          $p = isset($c['DB_PASSWORD']) ? $c['DB_PASSWORD'] : '';
          $d = isset($c['DB_NAME']) ? $c['DB_NAME'] : '';
          echo "host=$h  user=$u  db=$d  passlen=" . strlen($p) . "\n";
          if (!function_exists('mysqli_connect')) { echo "mysqli not available\n"; @unlink(__FILE__); exit; }
          mysqli_report(MYSQLI_REPORT_OFF);
          $conn = @mysqli_connect($h, $u, $p, $d);
          if ($conn) {
              echo "RESULT: OK — connected to '$d'\n";
          } else {
              echo "RESULT: FAIL errno=" . mysqli_connect_errno() . " : " . mysqli_connect_error() . "\n";
              $auth = @mysqli_connect($h, $u, $p);
              echo $auth
                  ? "  -> auth OK, but cannot open DB '$d' (user not granted to this database?)\n"
                  : "  -> auth FAILED (wrong user/password, or wrong host)\n";
          }
          @unlink(__FILE__);
          PHP
          echo "probe built"

      - name: Upload probe to dev root via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./diag/
          server-dir: /
          state-name: .ftp-deploy-diag-state.json
          dangerous-clean-slate: false
